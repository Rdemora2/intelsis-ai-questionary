    <line x1="18" y1="40" x2="38" y2="40"/>
    <line x1="18" y1="60" x2="38" y2="60"/>
    <line x1="18" y1="80" x2="38" y2="80"/>
    <line x1="42" y1="20" x2="58" y2="20"/>
    <line x1="42" y1="40" x2="58" y2="40"/>
    <line x1="42" y1="60" x2="58" y2="60"/>
    <line x1="42" y1="80" x2="58" y2="80"/>
    <line x1="62" y1="20" x2="82" y2="20"/>
    <line x1="62" y1="40" x2="82" y2="40"/>
    <line x1="62" y1="60" x2="82" y2="60"/>
    <line x1="62" y1="80" x2="82" y2="80"/>
