    <circle cx="40" cy="80" r="5"/>
    <circle cx="60" cy="80" r="4"/>
    <circle cx="82" cy="80" r="5"/>
  </g>
  <!-- Text -->
  <text x="105" y="38" fill="white" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="400" letter-spacing="6">GRUPO</text>
  <text x="105" y="76" fill="white" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="700" letter-spacing="3">INTELSIS</text>
