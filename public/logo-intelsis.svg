    <line x1="60" y1="44" x2="60" y2="56"/>
    <line x1="82" y1="44" x2="82" y2="56"/>
    <line x1="18" y1="64" x2="18" y2="76"/>
    <line x1="40" y1="64" x2="40" y2="76"/>
    <line x1="60" y1="64" x2="60" y2="76"/>
    <line x1="82" y1="64" x2="82" y2="76"/>
  </g>
  <!-- Nodes -->
  <g fill="#22c55e">
